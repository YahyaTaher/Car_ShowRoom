<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Car List - Car Showroom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .car-card {
            transition: transform 0.3s, box-shadow 0.3s;
            height: 100%;
        }
        .car-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .car-image {
            height: 200px;
            object-fit: cover;
        }
        .price-tag {
            font-size: 1.25rem;
            font-weight: bold;
            color: #28a745;
        }
        .search-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/cars">
                <i class="fas fa-car"></i> Car Showroom
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/cars">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/cars/add">Add Car</a>
                    </li>
                </ul>
                <form class="d-flex ms-3" action="/cars/search" method="get">
                    <input class="form-control me-2" type="search" name="company" 
                           placeholder="Search by company..." value="${param.company}">
                    <button class="btn btn-outline-light" type="submit">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <!-- Search Header (shown only when searching) -->
        <div class="search-header" th:if="${title}" th:text="${title}">
            Search Results
        </div>

        <!-- Cars Grid -->
        <div class="row" th:if="${not #lists.isEmpty(cars)}">
            <div class="col-md-4 mb-4" th:each="car : ${cars}">
                <div class="card car-card">
                    <!-- Car Image Placeholder -->
                    <div class="car-image bg-secondary d-flex align-items-center justify-content-center">
                        <i class="fas fa-car fa-4x text-white"></i>
                    </div>
                    
                    <div class="card-body">
                        <h5 class="card-title" th:text="${car.model.modelName}">Car Model</h5>
                        <p class="card-text">
                            <i class="fas fa-building"></i> 
                            <span th:text="${car.company.name}">Company</span><br>
                            
                            <i class="fas fa-calendar"></i> 
                            <span th:text="${car.yearOfPublish.yearValue}">2024</span><br>
                            
                            <i class="fas fa-tag"></i> 
                            <span class="price-tag" th:text="'$' + ${car.price}">$25000</span><br>
                            
                            <i class="fas fa-palette"></i> 
                            <span th:text="${car.color}">Color</span>
                        </p>
                        
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/cars/{id}(id=${car.carId})}" 
                               class="btn btn-primary btn-sm">
                                <i class="fas fa-eye"></i> View Details
                            </a>
                            <button class="btn btn-danger btn-sm" 
                                    onclick="deleteCar(${car.carId})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- No Cars Message -->
        <div class="alert alert-info text-center" th:if="${#lists.isEmpty(cars)}">
            <i class="fas fa-info-circle fa-2x mb-3"></i>
            <h4>No cars found</h4>
            <!-- CORRECT - safely checks for null -->
            <p th:if="${param.company != null or param.year != null}">
                Try adjusting your search criteria or 
                <a href="/cars/add" class="alert-link">add a new car</a>.
            </p>
            <p th:unless="${param.company != null or param.year != null}">
                Get started by <a href="/cars/add" class="alert-link">adding your first car</a>!
            </p>
        </div>
    </div>

    <!-- Delete Form (hidden) -->
    <form id="deleteForm" method="POST" style="display: none;">
        <input type="hidden" name="_method" value="DELETE">
    </form>

    <script>
        function deleteCar(carId) {
            if (confirm('Are you sure you want to delete this car?')) {
                const form = document.getElementById('deleteForm');
                form.action = '/cars/delete/' + carId;
                form.submit();
            }
        }
    </script>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2024 Car Showroom. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
