<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Car - Premium Auto</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="main-nav"></nav>

    <div class="container">
        <div class="card animate-fade-in-down" style="margin-bottom: 3rem;">
            <h2 style="font-weight: 700; color: var(--primary-color);">Find Your Perfect Car</h2>
            <p style="font-size: 1rem; color: #64748b; margin-bottom: 2rem;">
                Browse our exclusive premium inventory across all branches.
            </p>
            
            <form id="search-form" class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                <div class="form-group">
                    <label>Company</label>
                    <select id="filter-company" class="form-control">
                        <option value="">All Companies</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Model</label>
                    <input type="text" id="filter-model" class="form-control" placeholder="e.g. 3 Series">
                </div>
                <div class="form-group">
                    <label>Branch</label>
                    <select id="filter-branch" class="form-control">
                        <option value="">All Locations</option>
                    </select>
                </div>
                <div class="form-group" style="display: flex; align-items: flex-end;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Search Inventory</button>
                </div>
            </form>
        </div>

        <div id="loading" style="text-align: center; display: none;">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
            <p style="margin-top: 1rem; color: #64748b;">Searching premium inventory...</p>
        </div>

        <div id="car-results" class="row g-4 animate-fade-in-down" style="animation-delay: 0.2s;">
            <!-- Dynamic cars rendered by JS -->
        </div>
    </div>

    <!-- Purchase Modal -->
    <div id="purchase-modal" style="display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; overflow-y: auto; padding: 2rem 0;">
        <div id="purchase-summary" class="card" style="width: 90%; max-width: 500px; padding: 2rem; margin-bottom: 1rem;">
            <!-- Dynamic summary populated by JS -->
        </div>
        
        <div class="card" style="width: 90%; max-width: 500px; padding: 2rem; margin-bottom: 1rem;">
            <h3 style="color: var(--primary-color); margin-bottom: 1.5rem;">Customer Details</h3>
            <form id="purchase-form">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="customer-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="customer-phone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Payment Method *</label>
                    <select id="payment-method" class="form-control" required>
                        <option value="credit_card">Premium Credit Card</option>
                        <option value="bank_transfer">Direct Bank Transfer</option>
                        <option value="crypto">Cryptocurrency</option>
                    </select>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="button" onclick="closePurchaseModal()" class="btn" style="flex: 1; background: #e2e8f0; color: #475569;">Cancel</button>
                    <button type="submit" id="confirm-purchase-btn" class="btn btn-primary" style="flex: 2;">Confirm Purchase</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/options.js"></script>
    <script src="/js/search.js"></script>
    <script src="/js/rent.js"></script>
    <script>
        // Wire search form
        document.getElementById('search-form')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const filters = {
                company: document.getElementById('filter-company').value,
                model: document.getElementById('filter-model').value,
                branch: document.getElementById('filter-branch').value
            };
            searchCars(filters);
        });
    </script>
</body>
</html>
