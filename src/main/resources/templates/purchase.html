<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase a Car - Premium Auto</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="main-nav"></nav>

    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 100px);">
        <div class="card animate-fade-in-down" style="width: 100%; max-width: 650px; padding: 3rem;">
            <h2 style="font-weight: 700; color: var(--primary-color); margin-bottom: 0.5rem;">Finalize Your Purchase</h2>
            <p style="color: #64748b; margin-bottom: 2.5rem;">Please review your details and confirm your preferred payment method.</p>
            
            <div id="alert-success" class="alert alert-success" style="display:none; color: green; margin-bottom: 1rem;"></div>
            <div id="alert-error" class="alert alert-error" style="display:none; color: red; margin-bottom: 1rem;"></div>
            
            <form id="purchase-form">
                <div class="form-group">
                    <label>Selected Car ID</label>
                    <input type="text" id="car-id" class="form-control" readonly required style="background: #f1f5f9; font-weight: 600;">
                </div>
                
                <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Customer Name *</label>
                        <input type="text" id="customer-name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Phone *</label>
                        <input type="tel" id="customer-phone" class="form-control" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="customer-email" class="form-control">
                </div>
                
                <div class="form-group" style="margin-bottom: 2.5rem;">
                    <label>Payment Method *</label>
                    <select id="payment-method" class="form-control" required>
                        <option value="credit_card">Premium Credit Card</option>
                        <option value="bank_transfer">Direct Bank Transfer</option>
                        <option value="crypto">Cryptocurrency</option>
                    </select>
                </div>
                
                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" onclick="window.location.href='/cars'" class="btn" style="background: #e2e8f0; color: #475569;">Cancel</button>
                    <button type="submit" id="confirm-purchase-btn" class="btn btn-primary" style="padding: 0.85rem 2.5rem;">Confirm Purchase</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Purchase Modal Overlay (for summary if needed) -->
    <div id="purchase-modal" style="display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center; flex-direction: column;">
        <div id="purchase-summary" class="card" style="width: 90%; max-width: 500px; padding: 2rem;">
            <!-- Dynamic summary populated by JS -->
        </div>
        <button onclick="closePurchaseModal()" class="btn" style="margin-top: 1rem; background: #ef4444; color: white;">Close</button>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/options.js"></script>
    <script src="/js/rent.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Get car ID from URL if available
        const urlParams = new URLSearchParams(window.location.search);
        const carId = urlParams.get('carId');
        if (carId) {
            document.getElementById('car-id').value = carId;
        }

        async function loadPaymentMethods() {
            try {
                const options = await fetchDynamicOptions();
                fillSelect(
                    document.getElementById('payment-method'),
                    options.paymentMethods || [],
                    (m) => m,
                    (m) => m.replaceAll('_', ' ').replace(/\b\w/g, (ch) => ch.toUpperCase()),
                    'Select Payment Method'
                );
            } catch (error) {
                console.error('Failed to load payment methods:', error);
            }
        }

        loadPaymentMethods();

        document.getElementById('purchase-form').addEventListener('submit', (e) => {
            e.preventDefault();
            confirmPurchase();
        });
    </script>
</body>
</html>
