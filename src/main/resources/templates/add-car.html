<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Car - Car Showroom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
            background: #f8f9fa;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .form-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem;
            border-radius: 10px 10px 0 0;
            margin: -2rem -2rem 2rem -2rem;
        }
        .preview-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/cars">
                <i class="fas fa-car"></i> Car Showroom
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/cars">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/cars/add">Add Car</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="form-container">
            <div class="form-header text-center">
                <i class="fas fa-car fa-3x mb-3"></i>
                <h2>Add New Car</h2>
                <p class="mb-0">Fill in the details below to add a new car to inventory</p>
            </div>

            <form action="/cars/add" method="post">
                <!-- Company -->
                <div class="mb-3">
                    <label for="company" class="form-label">
                        <i class="fas fa-building"></i> Company *
                    </label>
                    <input type="text" class="form-control" id="company" name="company" 
                           placeholder="e.g., Toyota, Honda, Ford" required>
                    <div class="form-text">Enter the car manufacturer</div>
                </div>

                <!-- Model -->
                <div class="mb-3">
                    <label for="model" class="form-label">
                        <i class="fas fa-tag"></i> Model *
                    </label>
                    <input type="text" class="form-control" id="model" name="model" 
                           placeholder="e.g., Camry, Civic, Mustang" required>
                </div>

                <!-- Year -->
                <div class="mb-3">
                    <label for="year" class="form-label">
                        <i class="fas fa-calendar"></i> Year *
                    </label>
                    <select class="form-select" id="year" name="year" required>
                        <option value="">Select year...</option>
                        <!-- Generate last 20 years -->
                        <option th:each="i : ${#numbers.sequence(2024, 2005, -1)}" 
                                th:value="${i}" th:text="${i}"></option>
                    </select>
                </div>

                <!-- Price -->
                <div class="mb-3">
                    <label for="price" class="form-label">
                        <i class="fas fa-dollar-sign"></i> Price *
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" class="form-control" id="price" name="price" 
                               min="0" step="1000" required>
                    </div>
                </div>

                <!-- Color -->
                <div class="mb-3">
                    <label for="color" class="form-label">
                        <i class="fas fa-palette"></i> Color *
                    </label>
                    <div class="input-group">
                        <input type="color" class="form-control form-control-color" 
                               id="color" name="color" value="#000000" title="Choose color">
                        <input type="text" class="form-control" id="colorText" 
                               placeholder="Color name" required>
                    </div>
                </div>

                <!-- Additional Features (Optional) -->
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-cogs"></i> Features
                    </label>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="ac">
                                <label class="form-check-label" for="ac">
                                    Air Conditioning
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="nav">
                                <label class="form-check-label" for="nav">
                                    GPS Navigation
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="sunroof">
                                <label class="form-check-label" for="sunroof">
                                    Sunroof
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="leather">
                                <label class="form-check-label" for="leather">
                                    Leather Seats
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Submit Buttons -->
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-save"></i> Add Car to Inventory
                    </button>
                    <a href="/cars" class="btn btn-outline-secondary">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Sync color picker with text input
        document.getElementById('color').addEventListener('input', function(e) {
            document.getElementById('colorText').value = this.value;
        });
        
        document.getElementById('colorText').addEventListener('input', function(e) {
            // Optional: validate if color name is valid
        });
    </script>
</body>
</html>
