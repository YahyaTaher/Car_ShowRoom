<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Premium Auto</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/toast.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        .table-responsive {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar" id="main-nav"></nav>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <h3>Admin Panel</h3>
            <ul style="list-style: none; display: flex; flex-direction: column; gap: 0.5rem; padding: 0;">
                <li><a href="#inventory" class="nav-link" style="color: white; text-decoration: none;">Inventory Management</a></li>
                <li><a href="#pricing" class="nav-link" style="color: white; text-decoration: none;">Pricing Controls</a></li>
                
            </ul>
        </aside>

        <main class="main-content">
            <div id="dashboard-stats" class="row g-4 mb-5"></div>
            <div class="row g-4 mb-5">
                <div class="col-lg-6">
                    <div class="card border-0 shadow h-100">
                        <div class="card-header">
                            <h3>Sales Status</h3>
                        </div>
                        <div class="card-body">
                            <canvas id="salesStatusChart" height="140"></canvas>
                            <div class="mt-3 text-muted" id="approved-sales-percent"></div>
                            <div class="mt-2 text-muted" id="customers-purchased-count"></div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="card border-0 shadow h-100">
                        
                        <div class="card-body">
                            <canvas id="availableUnitsChart" height="140"></canvas>
                            <div class="mt-3 text-muted" id="available-units-total"></div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Cars Table -->
            <div class="card animate-fade-in-down">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h3>Car Inventory</h3>
                    <button class="btn btn-sm btn-primary" onclick="loadCarsTable()">Refresh Data</button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table id="carsTable" class="table table-hover align-middle" style="width:100%">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Brand</th>
                                    <th>Model</th>
                                    <th>Year</th>
                                    <th>Branch</th>
                                    <th>Price</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                        </table>
                    </div>
                </div>
            </div>
            
            <section id="inventory" class="card animate-fade-in-down" style="animation-delay: 0.1s;">
                <div class="card-header">
                    <h3>Add New Vehicle</h3>
                </div>
                <form id="inventory-form" class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                    <div class="form-group">
                        <label>Company</label>
                        <select id="car-company" class="form-control" required>
                            <option value="1">BMW</option>
                            <option value="2">Mercedes</option>
                            <option value="3">Audi</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Model</label>
                        <input type="text" id="car-model" class="form-control" placeholder="Model Name" required>
                    </div>
                    <div class="form-group">
                        <label>Year</label>
                        <input type="number" id="car-year" class="form-control" min="1900" max="2026" required>
                    </div>
                    <div class="form-group">
                        <label>Assign to Branch</label>
                        <select id="car-branch" class="form-control" required>
                            <option value="1">Main Branch, NYC</option>
                            <option value="2">Downtown, LA</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Price</label>
                        <input type="number" id="car-price" class="form-control" step="0.01" min="0.01" placeholder="e.g. 45000" required>
                    </div>
                    <div class="form-group">
                        <label>Quantity Available</label>
                        <input type="number" id="car-quantity" class="form-control" min="0" step="1" value="1" required>
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Colors (one per line)</label>
                        <textarea id="car-colors" class="form-control" rows="2" placeholder="Black&#10;White&#10;Red"></textarea>
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Image URLs (one per line)</label>
                        <textarea id="car-images" class="form-control" rows="3" placeholder="https://example.com/car-front.jpg&#10;https://example.com/car-side.jpg"></textarea>
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Add Car</button>
                    </div>
                </form>
            </section>

            <section id="pricing" class="card animate-fade-in-down" style="animation-delay: 0.2s;">
                <div class="card-header">
                    <h3>Update Car Pricing</h3>
                </div>
                <form id="pricing-form" class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                    <div class="form-group">
                        <label>Select Car</label>
                        <select id="pricing-car" class="form-control" required>
                            <option value="1">BMW 3 Series (2023)</option>
                            <option value="2">Audi A4 (2022)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>New Price</label>
                        <input type="number" id="new-price" class="form-control" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Effective Date</label>
                        <input type="date" id="pricing-date" class="form-control" required>
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Update Price</button>
                    </div>
                </form>
            </section>

            
            <section id="contracts" class="card animate-fade-in-down" style="animation-delay: 0.4s;">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h3>Pending Purchases</h3>
                    <button class="btn btn-sm btn-primary" onclick="loadPendingContracts()">Refresh</button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table id="contractsTable" class="table table-hover align-middle" style="width:100%">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>User</th>
                                    <th>Customer</th>
                                    <th>Car</th>
                                    <th>Branch</th>
                                    <th>Price</th>
                                    <th>Qty</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- jQuery for DataTables -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/options.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
